<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>青春不常在，抓紧谈恋爱</h3>
    <table width="500" border="0">
        <tr>
            <td>性别:</td>
            <td>
                <input type="radio" name="sex" value="male" id="man"><label for="man">男</label>
                <input type="radio" name="sex" value="female" id="woman"><label for="woman">女</label>
            </td>
        </tr>
        <tr>
            <td>生日:</td>
            <td>
                <select name="year">
                    <option value="" select=selected>--请选择年--</option>
                    <option value="1990">1990</option>
                    <option value="1991">1991</option>
                    <option value="1992">1992</option>
                    <option value="1993">1993</option>
                    <option value="1994">1994</option>
                </select>年
                <select name="month">
                    <option value="" select=selected>--请选择月--</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>月
                <select name="day">
                    <option value="" select=selected>--请选择日--</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>日
            </td>
        </tr>
        <tr>
            <td><label for="area">所在地区:</label></td>
            <td>
                <input type="text" name="area" id="area" value="北京思密达">
            </td>
        </tr>
        <tr>
            <td>婚姻状况:</td>
            <td>
                <input type="radio" name="marriage" value="single" id="single"><label for="single">未婚</label>
                <input type="radio" name="marriage" value="married" id="married"><label for="married">已婚</label>
                <input type="radio" name="marriage" value="divorced" id="divorced"><label for="divorced">离婚</label>
            </td>
        </tr>
        <tr>
            <td><label for="education">学历:</label></td>
            <td>
                <input type="text" name="education" id="education" value="幼儿园">
            </td>
        </tr>
        <tr>
            <td>喜欢的类型:</td>
            <td>
                <input type="checkbox" name="type" value="1" id="type1"><label for="type1">妩媚的</label>
                <input type="checkbox" name="type" value="2" id="type2"><label for="type2">可爱的</label>
                <input type="checkbox" name="type" value="3" id="type3"><label for="type3">小鲜肉</label>
                <input type="checkbox" name="type" value="4" id="type4"><label for="type4">老腊肉</label>
                <input type="checkbox" name="type" value="5" id="type5"><label for="type5">都喜欢</label>
            </td>
        </tr>
        <tr>
            <td><label for="introduction">自我介绍:</label></td>
            <td>
                <textarea cols="30" rows="3">自我介绍</textarea>
            </td>
        </tr>
        <tr>
            <td></td>
            <td align="left">
                <input type="submit" value="免费注册">
            </td>
        </tr>
        <tr>
            <td></td>
            <td align="left">
                <input type="checkbox" name="agreement" value="agree" id="agreement" checked><label
                    for="agreement">我同意注册条款和会员加入标准</label>
            </td>
        </tr>
        <tr>
            <td></td>
            <td align="left">
                <a href="#" target="_blank">我是会员，立即登录</a>
            </td>
        </tr>
        <tr>
            <td></td>
            <td align="left">
                <h3>我承诺</h3>
                <ul>
                    <li>年满18岁、单身</li>
                    <li>抱着严肃的态度</li>
                    <li>真诚寻找另一半</li>
                </ul>
            </td>
        </tr>
    </table>
</body>

</html>
