    <script>
        (function () {
            const username = localStorage.getItem('username');
            const token = localStorage.getItem('token');
            const userArea = document.getElementById('userArea');
            if (!userArea) return;

            if (username && token) {
                userArea.innerHTML = `
            <a href="#">我的订单</a>
            <span>|</span>
            <div class="user-menu">
              <a href="#" class="username-link">${username}</a>
              <div class="dropdown">
                <a href="#">个人中心</a>
                <a href="#">评价晒单</a>
                <a href="#">我的喜欢</a>
                <a href="小米账户.html">小米账户</a>
                <a href="#" id="logoutBtn">退出登录</a>
              </div>
            </div>
          `;

                fetchUserInfo(token);

                document.getElementById('logoutBtn').addEventListener('click', async function (e) {
                    e.preventDefault();
                    try {
                        await fetch('http://47.107.55.106:8080/api/user/logout', {
                            method: 'GET',
                            headers: {
                                'Authorization': token
                            }
                        });
                    } catch (error) {
                        console.log('退出接口调用失败:', error);
                    }
                    localStorage.removeItem('username');
                    localStorage.removeItem('token');
                    window.location.reload();
                });
            } else {
                userArea.innerHTML = `
            <a href="登录页面.html">登录</a>
            <span>|</span>
            <a href="登录页面.html?action=register">注册</a>
            <span>|</span>
            <a href="#">消息通知</a>
          `;
            }

            async function fetchUserInfo(token) {
                try {
                    const response = await fetch('http://47.107.55.106:8080/api/user/info', {
                        method: 'GET',
                        headers: {
                            'Authorization': token
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const realName = data.data?.name || data.data?.username || username;
                        localStorage.setItem('username', realName);
                        const usernameLink = document.querySelector('.username-link');
                        if (usernameLink) {
                            usernameLink.textContent = realName;
                        }
                    }
                } catch (error) {
                    console.log('获取用户信息失败:', error);
                }
            }
        })();
    </script>
