<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小米账号-个人中心</title>
  <link rel="icon" href="https://www.mi.com/favicon.ico">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="小米账户.css">
</head>

<body>
  <div class="box picture"></div>
  <div class="box right-box">
    <div class="header">
      <div class="header-title">
        <img class="logo" src="logo.png">
        <h1 class="title">小米账号</h1>
      </div>
      <div class="word">
        <a href="#">用户协议</a>
        <a href="#">隐私政策</a>
        <a href="#">帮助中心</a>
        <span>|</span>
        <div class="lang">中文（简体）</div>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-header">
          <h2>个人信息</h2>
          <a href="#" class="logout-link" id="logoutBtn">退出</a>
        </div>
        <div class="info-list">
          <div class="info-item avatar-item" id="editAvatar">
            <span class="label">头像</span>
            <span class="value">
              <img src="logo.png" class="avatar" id="avatarImg">
              <i class="fa-solid fa-angle-right arrow-right"></i>
            </span>
          </div>
          <div class="info-item" id="editNickname">
            <span class="label">昵称</span>
            <span class="value">
              <span id="nicknameText" class="placeholder-text">请设置昵称</span>
              <i class="fa-solid fa-angle-right arrow-right"></i>
            </span>
          </div>
          <div class="info-item" id="editBirth">
            <span class="label">生日</span>
            <span class="value">
              <span id="birthText" class="placeholder-text">未设置</span>
              <i class="fa-solid fa-angle-right arrow-right"></i>
            </span>
          </div>
          <div class="info-item" id="editGender">
            <span class="label">性别</span>
            <span class="value">
              <span id="genderText" class="placeholder-text">未设置</span>
              <i class="fa-solid fa-angle-right arrow-right"></i>
            </span>
          </div>
          <div class="info-item">
            <span class="label">国家/地区</span>
            <span class="value">
              <span>中国</span>
              <i class="fa-solid fa-angle-right arrow-right"></i>
            </span>
          </div>
        </div>

        <div class="section-title">登录与安全</div>
        <div class="section-title">隐私中心</div>
        <div class="section-title">绑定授权</div>
        <div class="section-title">帮助中心</div>
      </div>
    </div>
    <div class="information">
      "小米公司版权所有-京ICP备10046444-"<a href="#">京公网安备11010802020134号</a>"-京ICP证110507号"
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span id="modalClose" class="modal-close">&times;</span>
        <h3 id="modalTitle">编辑</h3>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="modal-btn cancel-btn" id="modalCancel">取消</button>
        <button class="modal-btn confirm-btn" id="modalConfirm">确定</button>
      </div>
    </div>
  </div>

  <script src="小米账户.js"></script>
</body>

</html>
