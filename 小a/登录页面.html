<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小米账号-登录</title>
  <link rel="icon" href="https://www.mi.com/favicon.ico">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="登录页面.css">
</head>

<body>
  <div class="box picture"></div>
  <div class="box right-box">
    <div class="header">
      <div class="header-title">
        <img class="logo" src="logo.png">
        <h1 class="title">小米账号</h1>
      </div>
      <div class="word">
        <a href="https://static.account.xiaomi.com/html/agreement/user/zh_CN.html" target="_self">用户协议</a>
        <a href="https://privacy.mi.com/miaccount/zh_CN/" target="_self">隐私政策</a>
        <a href="https://account.xiaomi.com/helpcenter?_locale=zh_CN" target="_self">帮助中心</a>
        <span>|</span>
        <div class="lang">中文(简体)</div>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="tabs">
          <span class="tab active" id="loginTab">登录</span>
          <span class="tab" id="registerTab">注册</span>
        </div>
        <div class="card-content active" id="loginForm">
          <div class="phone-row">
            <input type="text" class="input" placeholder="邮箱/手机号码/小米ID">
          </div>
          <input type="password" class="input-full" placeholder="密码">
          <div class="agree">
            <input type="checkbox" id="agree-login">
            <label for="agree-login">已阅读并同意<a href="#">小米账号使用协议</a>和<a href="#">小米账号隐私政策</a></label>
          </div>

          <button class="btn">登录</button>

          <div class="links">
            <a
              href="https://account.xiaomi.com/fe/service/forgetPassword?_bannerBiz=&sid=mi_eshop&callback=http%3A%2F%2Forder.mi.com%2Flogin%2Fcallback%3Ffollowup%3Dhttps%253A%252F%252Fwww.mi.com%252Fshop%26sign%3DODA5NjU3ZjZkYjkxMWE3ZjVkYTE5M2MxMDNlYmJkYzJhZGFjNzBhYg%2C%2C&qs=&_locale=zh_CN">忘记密码？</a>
            <a href="#">手机号登录</a>
          </div>
          <div class="other">
            <span>其他方式登录</span>
            <div class="icons">
              <a href="#"><i class="fab fa-alipay"></i></a>
              <a href="#"><i class="fab fa-weixin"></i></a>
              <a href="#"><i class="fab fa-qq"></i></a>
              <a href="#"><i class="fab fa-weibo"></i></a>
            </div>
          </div>
        </div>
        <div class="card-content" id="registerForm">
          <div class="phone-row">
            <span>国家/地区</span>
            <div class="select-box small">
              <div class="selection country">
                <span>中国</span>
                <div class="arrow"></div>
              </div>
            </div>
          </div>
          <div class="phone-row">
            <input type="text" class="input" placeholder="请输入账号">
          </div>
          <div class="code-row">
            <input type="text" class="input" placeholder="请输入密码">
          </div>
          <div class="agree">
            <input type="checkbox" id="agree-reg">
            <label for="agree-reg">已阅读并同意<a href="#">小米账号使用协议</a>和<a href="#">小米账号隐私政策</a></label>
          </div>
          <button class="btn">注册</button>
          <a href="#" class="link">收不到验证码?</a>
        </div>
      </div>
    </div>
    <div class="information">"小米公司版权所有-京ICP备10046444-"<a
        href="https://www.beian.gov.cn/portal/registerSystemInfo?recordcode=11010802020134" target="_blank"
        rel="noopener noreferrer">京公网安备11010802020134号</a>"-京ICP证110507号"
    </div>
  </div>
  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'register') {
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      registerForm.classList.add('active');
      loginForm.classList.remove('active');
    }
    registerTab.addEventListener('click', () => {
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      registerForm.classList.add('active');
      loginForm.classList.remove('active');
    });
    loginTab.addEventListener('click', () => {
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      loginForm.classList.add('active');
      registerForm.classList.remove('active');
    });
  </script>
  <script src="login.js"></script>
  <script src="register.js"></script>
</body>

</html>
