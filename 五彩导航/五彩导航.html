<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五彩导航</title>
    <style>
        a {
            display: inline-block;
            width: 120px;
            height: 60px;
            line-height: 60px;
            text-align: center;
            color: black;
            text-decoration: none;
        }

        .y {
            background: white url(黄色.png) no-repeat top;
        }

        .b {
            background: white url(黑色.png) no-repeat top;
        }

        .bl {
            background: white url(蓝色.png) no-repeat top;
        }

        .r {
            background: white url(红色.png) no-repeat top;
        }

        .g {
            background: white url(绿色.png) no-repeat top;
        }

        .y:hover {
            background: white url(黑色.png) no-repeat bottom;
        }

        .b:hover {
            background: white url(蓝色.png) no-repeat bottom;
        }

        .bl:hover {
            background: white url(红色.png) no-repeat bottom;
        }

        .r:hover {
            background: white url(绿色.png) no-repeat bottom;
        }

        .g:hover {
            background: white url(黄色.png) no-repeat bottom;
        }
    </style>
</head>

<body>
    <a href="#" class="y">五彩导航</a>
    <a href="#" class="b">五彩导航</a>
    <a href="#" class="bl">五彩导航</a>
    <a href="#" class="r">五彩导航</a>
    <a href="#" class="g">五彩导航</a>
</body>

</html>
